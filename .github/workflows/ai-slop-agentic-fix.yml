name: AI Slop Agentic Fix

on:
  workflow_dispatch:
    inputs:
      analyzer_ref:
        description: "Ref of PGCodeLLM/code-health to use"
        required: true
        default: "main"
        type: string
      fix_rules:
        description: "Comma-separated AI slop rule ids to attempt"
        required: true
        type: string
        default: "ai-slop/python-semantic-duplicate-business-logic,ai-slop/python-infrastructure-reinvention,ai-slop/python-cross-language-api,ai-slop/python-function-level-import,ai-slop/python-broad-except,ai-slop/python-unjustified-suppression,ai-slop/python-hallucinated-import,ai-slop/python-llm-assertion-correctness"
      limit:
        description: "Maximum diagnostic fix attempts"
        required: true
        default: "5"
        type: string
      jobs:
        description: "Maximum concurrent diagnostic fix attempts"
        required: true
        default: "2"
        type: string
      enable_llm_review:
        description: "Enable scanner LLM review before selecting fixes"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  agentic-fix:
    name: Generate agentic fix patches
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          path: head
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout repo analyzer
        uses: actions/checkout@v4
        with:
          repository: PGCodeLLM/code-health
          path: analyzer
          ref: ${{ inputs.analyzer_ref }}
          token: ${{ secrets.REPO_ANALYSIS_TOKEN || github.token }}
          persist-credentials: false

      - name: Show checkout state
        run: |
          set -euo pipefail
          echo "Target checkout:"
          git -C head rev-parse --short HEAD
          echo "Analyzer checkout:"
          git -C analyzer rev-parse --short HEAD

      - name: Build analyzer image with Codex
        run: |
          set -euo pipefail
          docker build \
            --build-arg INSTALL_CODEX=1 \
            -t repo-analysis-prototype \
            analyzer

      - name: Analyze target repository
        env:
          AISLOP_LLM_PROVIDER: ${{ secrets.AISLOP_LLM_PROVIDER || vars.AISLOP_LLM_PROVIDER || 'openai-compatible' }}
          AISLOP_LLM_API_KEY: ${{ secrets.AISLOP_LLM_API_KEY }}
          AISLOP_LLM_MODEL: ${{ secrets.AISLOP_LLM_MODEL || vars.AISLOP_LLM_MODEL }}
          AISLOP_LLM_BASE_URL: ${{ secrets.AISLOP_LLM_BASE_URL || vars.AISLOP_LLM_BASE_URL }}
          AISLOP_LLM_ENDPOINT_URL: ${{ secrets.AISLOP_LLM_ENDPOINT_URL || vars.AISLOP_LLM_ENDPOINT_URL }}
          AISLOP_LLM_TIMEOUT: ${{ secrets.AISLOP_LLM_TIMEOUT || vars.AISLOP_LLM_TIMEOUT }}
        run: |
          set -euo pipefail
          scan_args=(
            analyzer/docker/analyze-codebase
            --skip-build
            --output /tmp/repo-analysis/output/head
            head
            --report
          )
          if [[ "${{ inputs.enable_llm_review }}" == "true" ]]; then
            scan_args+=(--enable-llm-review)
          fi
          "${scan_args[@]}"

      - name: Locate analysis output
        run: |
          set -euo pipefail
          HEAD_JSON="$(find /tmp/repo-analysis/output/head -name '*_codehealth_analysis_*.json' | sort | tail -1)"
          if [[ -z "$HEAD_JSON" ]]; then
            echo "Could not find analysis JSON output" >&2
            find /tmp/repo-analysis -maxdepth 4 -type f -print >&2
            exit 1
          fi
          echo "HEAD_JSON=$HEAD_JSON" >> "$GITHUB_ENV"
          echo "Head JSON: $HEAD_JSON"

      - name: Generate agentic fix patches
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL }}
          AGENTIC_AGENT: codex
          AGENTIC_TIMEOUT: ${{ vars.AGENTIC_TIMEOUT || '1800' }}
          AGENTIC_CODEX_MODEL: ${{ secrets.AGENTIC_CODEX_MODEL || vars.AGENTIC_CODEX_MODEL }}
          AGENTIC_CODEX_BASE_URL: ${{ secrets.AGENTIC_CODEX_BASE_URL || vars.AGENTIC_CODEX_BASE_URL }}
          AGENTIC_CODEX_WIRE_API: ${{ vars.AGENTIC_CODEX_WIRE_API || 'responses' }}
        run: |
          set -euo pipefail
          fix_rule_args=()
          fix_rules_input="${{ inputs.fix_rules }}"
          fix_rules_input="${fix_rules_input//,/$'\n'}"
          while IFS= read -r rule; do
            rule="${rule%%#*}"
            rule="$(printf '%s' "$rule" | xargs)"
            if [[ -n "$rule" ]]; then
              fix_rule_args+=(--fix-rule "$rule")
            fi
          done <<< "$fix_rules_input"

          if [[ "${#fix_rule_args[@]}" -eq 0 ]]; then
            echo "At least one fix rule is required." >&2
            exit 2
          fi

          echo "Parsed $((${#fix_rule_args[@]} / 2)) fix rule(s):"
          for ((i = 1; i < ${#fix_rule_args[@]}; i += 2)); do
            printf '  %s\n' "${fix_rule_args[$i]}"
          done

          analyzer/docker/agentic-fix-codebase \
            --skip-build \
            --analysis-json "$HEAD_JSON" \
            --output /tmp/repo-analysis/agentic-fixes \
            head \
            --source aislop \
            --agent codex \
            "${fix_rule_args[@]}" \
            --limit "${{ inputs.limit }}" \
            --jobs "${{ inputs.jobs }}"

      - name: Write agentic fix summary
        if: always()
        run: |
          set -euo pipefail
          if [[ -f /tmp/repo-analysis/agentic-fixes/run-full.json ]]; then
            if [[ -f analyzer/scripts/summarize-agentic-fix.py ]]; then
              python analyzer/scripts/summarize-agentic-fix.py \
                --run-full /tmp/repo-analysis/agentic-fixes/run-full.json \
                --output /tmp/repo-analysis/agentic-fix-summary.md
              cat /tmp/repo-analysis/agentic-fix-summary.md >> "$GITHUB_STEP_SUMMARY"
              {
                echo
                echo "Patch artifacts are available in the uploaded workflow artifact."
              } >> "$GITHUB_STEP_SUMMARY"
            else
              {
                echo "## AI Slop Agentic Fix"
                echo
                echo "Agentic fix artifacts were generated, but this analyzer ref does not include \`scripts/summarize-agentic-fix.py\`."
                echo "Use an analyzer ref that includes the summary script for the detailed report."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            {
              echo "## AI Slop Agentic Fix"
              echo
              echo "No agentic fix run manifest was written."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload agentic fix artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-slop-agentic-fix-${{ github.run_id }}
          path: |
            /tmp/repo-analysis/output/head/
            /tmp/repo-analysis/agentic-fixes/
            /tmp/repo-analysis/agentic-fix-summary.md
          retention-days: 14
